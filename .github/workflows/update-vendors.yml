name: Update Weekly Vendor Data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # Tuesday: normal weekly vendor reset.
    - cron: '0 10 * * 2'
    # Wednesday: catches Cassie's later inventory update.
    - cron: '0 10 * * 3'

permissions:
  contents: write

concurrency:
  group: weekly-vendor-update
  cancel-in-progress: false

jobs:
  update-vendors:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Synchronize vendor data
        run: node scripts/sync-vendor-data.mjs

      - name: Commit synchronization result
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- public/data; then
            echo "No vendor files or metadata changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data
          git commit -m "Sync weekly vendor data"
          git push
